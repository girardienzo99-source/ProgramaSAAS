# Configuracion de Supabase local
project_id = "programa-sass"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320

[studio]
port = 54323
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/*"]
jwt_expiry = 3600

[storage]
enabled = true
# Buckets de almacenamiento de Supabase (por ejemplo, para logos de empresas, imágenes de productos, etc.)
# Se configurarán dinámicamente mediante el cliente de storage.
